<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Biochemistry — Study App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080d14"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080d14;
  --surface: #0f1620;
  --surface2: #161f2e;
  --surface3: #1c2840;
  --border: #1e2d45;
  --border2: #243550;
  --text: #e4eaf5;
  --text2: #a8b8d8;
  --muted: #5a6e8f;
  --accent: #3d8ef0;
  --accent-glow: rgba(61,142,240,0.18);
  --accent2: #30d4a0;
  --accent2-glow: rgba(48,212,160,0.15);
  --red: #f06060;
  --green: #30d4a0;
  --yellow: #f0c030;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  display:flex;flex-direction:column;height:100dvh;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(61,142,240,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(61,142,240,0.025) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0;
}
.topbar,.main{position:relative;z-index:1;}

/* TOP BAR */
.topbar{
  background:linear-gradient(180deg,#0d1624 0%,#0a1220 100%);
  border-bottom:1px solid var(--border2);
  padding:14px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 2px 16px rgba(0,0,0,0.3);
  padding-top:max(14px,env(safe-area-inset-top));
}
.topbar h1{
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar h1 span{
  background:linear-gradient(135deg,var(--accent) 0%,#60b4ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.badge{
  font-size:10px;
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  color:#fff;padding:4px 10px;border-radius:20px;font-weight:700;letter-spacing:0.3px;
  box-shadow:0 2px 8px rgba(61,142,240,0.3);
}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;overscroll-behavior:contain;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.section{display:none;padding:14px 14px 80px;animation:fadeSlideUp 0.25s ease;}
.section.active{display:flex;flex-direction:column;}

/* FILTER TABS */
.filter-row{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{
  flex-shrink:0;padding:8px 14px;border-radius:22px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;letter-spacing:0.1px;
  cursor:pointer;transition:all 0.18s;font-family:'DM Sans',sans-serif;min-height:38px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;scroll-snap-align:start;
  user-select:none;-webkit-user-select:none;
}
.filter-btn:active{transform:scale(0.95);}
.filter-btn.active{
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(61,142,240,0.35);
}

/* QUIZ HEADER */
.quiz-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.quiz-back-btn{
  display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;
  border:1px solid var(--border2);background:var(--surface);color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.18s;flex-shrink:0;min-height:36px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.quiz-back-btn:hover{color:var(--text);border-color:var(--accent);}
.quiz-back-btn:active{transform:scale(0.95);}
.quiz-q-num{font-size:12px;color:var(--muted);font-weight:600;flex:1;text-align:center;}
.quiz-score-chip{
  font-size:12px;font-weight:700;color:var(--accent2);
  background:var(--accent2-glow);border:1px solid rgba(48,212,160,0.2);
  padding:4px 12px;border-radius:20px;flex-shrink:0;
}
.quiz-progress-bar{height:3px;background:var(--surface2);border-radius:4px;margin-bottom:14px;overflow:hidden;}
.quiz-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));
  background-size:200% 100%;animation:shimmer 2s linear infinite;
  border-radius:4px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 0 8px rgba(61,142,240,0.4);
}
.quiz-type-badge{font-size:9px;padding:4px 10px;border-radius:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.quiz-type-badge.tf{background:rgba(240,192,48,0.12);color:var(--yellow);border:1px solid rgba(240,192,48,0.2);}
.quiz-type-badge.mcq{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(61,142,240,0.2);}

/* QUIZ CARD */
.quiz-card{
  background:linear-gradient(160deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:18px 16px;margin-bottom:12px;box-shadow:var(--shadow);
}
.quiz-question{font-size:clamp(14px,3.8vw,16px);line-height:1.65;color:var(--text);margin-bottom:16px;margin-top:10px;font-weight:400;}
.quiz-options{display:flex;flex-direction:column;gap:9px;}
.quiz-opt{
  padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-size:15px;font-weight:400;
  cursor:pointer;text-align:left;transition:all 0.18s;font-family:'DM Sans',sans-serif;
  line-height:1.45;display:flex;align-items:flex-start;gap:10px;
  min-height:52px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.quiz-opt:hover{border-color:var(--accent);background:var(--surface3);}
.quiz-opt:active{opacity:0.85;transform:scale(0.99);}
.quiz-opt.correct{background:rgba(48,212,160,0.1);border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(48,212,160,0.1);}
.quiz-opt.wrong{background:rgba(240,96,96,0.1);border-color:var(--red);color:var(--red);}
.quiz-opt.show-correct{background:rgba(48,212,160,0.07);border-color:var(--green);color:var(--green);}
.quiz-opt .opt-label{font-weight:700;font-size:12px;flex-shrink:0;margin-top:2px;opacity:0.5;}
.quiz-opt.correct .opt-label,.quiz-opt.wrong .opt-label,.quiz-opt.show-correct .opt-label{opacity:1;}
.quiz-opt[disabled]{cursor:default;}
.quiz-opt span:last-child{word-break:break-word;}

/* TF */
.tf-buttons{display:flex;gap:10px;}
.tf-btn{
  flex:1;padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-size:17px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s;min-height:56px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.tf-btn:active{transform:scale(0.97);}
.tf-btn.true-btn:hover{background:rgba(48,212,160,0.1);border-color:var(--green);}
.tf-btn.false-btn:hover{background:rgba(240,96,96,0.1);border-color:var(--red);}
.tf-btn.correct{background:rgba(48,212,160,0.15);border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(48,212,160,0.1);}
.tf-btn.wrong{background:rgba(240,96,96,0.12);border-color:var(--red);color:var(--red);}
.tf-btn[disabled]{cursor:default;}

/* EXPLANATION */
.quiz-explanation{
  margin-top:12px;padding:12px 14px;
  background:var(--accent-glow);border:1px solid rgba(61,142,240,0.18);
  border-radius:var(--radius-sm);font-size:13px;color:var(--text2);
  line-height:1.6;display:none;
}
.quiz-explanation.visible{display:block;animation:fadeSlideUp 0.25s ease both;}
.quiz-explanation strong{color:var(--accent);}

/* NEXT BTN */
.quiz-next-btn{
  width:100%;padding:15px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;min-height:52px;
  box-shadow:0 4px 18px rgba(61,142,240,0.35);
  transition:opacity 0.18s,transform 0.15s;letter-spacing:0.2px;display:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.quiz-next-btn.visible{display:block;animation:pulseIn 0.3s ease both;}
.quiz-next-btn:active{transform:scale(0.98);opacity:0.9;}

/* START SCREEN */
.quiz-start{text-align:center;padding:12px 0;}
.quiz-start h2{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.quiz-start p{color:var(--muted);font-size:13px;margin-bottom:20px;}
.start-options{display:flex;flex-direction:column;gap:9px;max-width:340px;margin:0 auto 16px;}
.start-opt-btn{
  padding:16px 18px;border-radius:var(--radius);border:1px solid var(--border2);
  background:var(--surface);color:var(--text);text-align:left;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;min-height:56px;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.start-opt-btn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);opacity:0;transition:opacity 0.2s;border-radius:3px 0 0 3px;
}
.start-opt-btn:hover{border-color:var(--accent);background:var(--surface2);}
.start-opt-btn:hover::before{opacity:1;}
.start-opt-btn:active{transform:scale(0.98);background:var(--surface2)!important;}
.start-opt-btn .sot{font-size:14px;font-weight:700;display:block;margin-bottom:3px;}
.start-opt-btn .son{font-size:11px;color:var(--muted);}
.start-opt-all{border-color:var(--accent)!important;background:linear-gradient(135deg,rgba(61,142,240,0.1) 0%,rgba(61,142,240,0.05) 100%)!important;}
.start-opt-all::before{opacity:1!important;background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%)!important;}
.start-opt-all .sot{color:var(--accent);}

/* RESULT */
.quiz-result{display:none;text-align:center;padding:28px 16px;}
.quiz-result.visible{display:block;}
.result-score{
  font-family:'Syne',sans-serif;font-size:68px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:14px 0 8px;filter:drop-shadow(0 0 20px rgba(61,142,240,0.2));
}
.result-label{font-size:14px;color:var(--muted);margin-bottom:24px;}
.result-stats{display:flex;gap:10px;justify-content:center;margin-bottom:28px;}
.stat-chip{padding:9px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;border:1px solid transparent;}
.stat-chip.green{background:rgba(48,212,160,0.1);color:var(--green);border-color:rgba(48,212,160,0.2);}
.stat-chip.red{background:rgba(240,96,96,0.1);color:var(--red);border-color:rgba(240,96,96,0.2);}
.restart-btn{
  padding:15px 36px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;box-shadow:0 4px 18px rgba(61,142,240,0.35);
  min-height:52px;transition:transform 0.15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.restart-btn:active{transform:scale(0.97);}

/* CONFIRM MODAL */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;animation:fadeIn 0.2s ease;
}
.confirm-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  padding:28px 24px;max-width:320px;width:100%;text-align:center;
  box-shadow:var(--shadow-lg);animation:scaleIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.confirm-icon{font-size:36px;margin-bottom:14px;}
.confirm-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px;}
.confirm-msg strong{color:var(--text);}
.confirm-btns{display:flex;gap:10px;}
.confirm-no{
  flex:1;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;min-height:48px;transition:all 0.18s;
}
.confirm-no:hover{border-color:var(--accent);}
.confirm-yes{
  flex:1;padding:13px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--red) 0%,#d04040 100%);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;min-height:48px;
  box-shadow:0 3px 12px rgba(240,96,96,0.3);transition:transform 0.15s;
}
.confirm-yes:active{transform:scale(0.97);}

/* KEYFRAMES */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes countUp{from{opacity:0;transform:scale(0.7) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes pulseIn{0%{opacity:0;transform:scale(0.95) translateY(6px);}60%{transform:scale(1.02) translateY(0);}100%{opacity:1;transform:scale(1) translateY(0);}}

.quiz-result.visible .result-score{animation:countUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;}
.quiz-result.visible .result-stats{animation:fadeSlideUp 0.4s ease 0.3s both;}
.quiz-result.visible .restart-btn{animation:fadeSlideUp 0.4s ease 0.45s both;}
.quiz-options .quiz-opt:nth-child(1){animation:fadeSlideUp 0.2s ease 0.05s both;}
.quiz-options .quiz-opt:nth-child(2){animation:fadeSlideUp 0.2s ease 0.1s both;}
.quiz-options .quiz-opt:nth-child(3){animation:fadeSlideUp 0.2s ease 0.15s both;}
.quiz-options .quiz-opt:nth-child(4){animation:fadeSlideUp 0.2s ease 0.2s both;}
.tf-buttons .tf-btn:nth-child(1){animation:fadeSlideUp 0.2s ease 0.05s both;}
.tf-buttons .tf-btn:nth-child(2){animation:fadeSlideUp 0.2s ease 0.1s both;}

/* MOBILE FIXES */
body{padding-bottom:env(safe-area-inset-bottom);}
button,[role="button"]{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
@media(min-width:540px){body{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);}}
@media(max-width:360px){
  .topbar h1{font-size:15px;}
  .quiz-card{padding:14px 12px;}
  .quiz-opt{padding:11px 12px;font-size:13px;min-height:48px;}
  .tf-btn{font-size:14px;padding:14px;}
  .start-opt-btn{padding:12px 14px;}
  .start-opt-btn .sot{font-size:13px;}
  .result-score{font-size:52px;}
}
@media(min-width:414px){
  .section{padding:16px 16px 80px;}
  .start-options{gap:10px;}
  .quiz-opt{padding:14px 16px;}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>Bio<span>chemistry</span></h1>
  <span class="badge">Quiz</span>
</div>

<div class="main">
  <div class="section active" id="section-quiz">

    <!-- Filter tabs -->
    <div class="filter-row" id="quizFilter">
      <button class="filter-btn active" id="btn-lec34" onclick="setFilter('lec34', this)">🧬 Lec 3&amp;4 (50)</button>
      <button class="filter-btn" id="btn-lec5" onclick="setFilter('lec5', this)">🔬 Lec 5 (60)</button>
      <button class="filter-btn" id="btn-lec6" onclick="setFilter('lec6', this)">🧪 Lec 6 (30)</button>
      <button class="filter-btn" id="btn-lec7" onclick="setFilter('lec7', this)">⚗️ Lec 7 (50)</button>
      <button class="filter-btn" id="btn-lec8" onclick="setFilter('lec8', this)">🍬 Lec 8 (40)</button>
      <button class="filter-btn" id="btn-lec9" onclick="setFilter('lec9', this)">⚡ Lec 9 (55)</button>
      <button class="filter-btn" id="btn-enz1" onclick="setFilter('enz1', this)">🔩 Enz 1 (45)</button>
      <button class="filter-btn" id="btn-enz2" onclick="setFilter('enz2', this)">⚙️ Enz 2 (45)</button>
      <button class="filter-btn" id="btn-prac" onclick="setFilter('prac', this)">🧫 Practical (80)</button>
      <button class="filter-btn" id="btn-all" onclick="setFilter('all', this)">🌐 All (455)</button>
      <button class="filter-btn" id="btn-tf" onclick="setFilter('tf', this)">✅ T/F Only</button>
      <button class="filter-btn" id="btn-mcq" onclick="setFilter('mcq', this)">🔵 MCQ Only</button>
    </div>

    <!-- Start Screen -->
    <div id="quizStart" class="quiz-start">
      <h2 id="startTitle">Quiz Mode</h2>
      <p id="startSubtitle">Select a category above, then start.</p>
      <div class="start-options">
        <button class="start-opt-btn start-opt-all" id="startAllBtn" onclick="startQuiz('current')">
          <span class="sot" id="startBtnLabel">⚡ Start Lectures 3 &amp; 4 Quiz</span>
          <span class="son" id="startBtnSub">50 questions — shuffled</span>
        </button>
      </div>
    </div>

    <!-- Active Quiz -->
    <div id="quizActive" style="display:none;">
      <div class="quiz-header">
        <button class="quiz-back-btn" onclick="quizBack()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </button>
        <span class="quiz-q-num" id="qNum">Q1 / 50</span>
        <span class="quiz-score-chip" id="qScore">✓ 0</span>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="qProgress" style="width:0%"></div>
      </div>
      <div class="quiz-card">
        <span class="quiz-type-badge" id="qTypeBadge">T/F</span>
        <p class="quiz-question" id="qQuestion" style="margin-top:10px;">—</p>
        <div class="quiz-options" id="qOptions"></div>
        <div class="quiz-explanation" id="qExplanation"></div>
      </div>
      <button class="quiz-next-btn" id="qNextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>

    <!-- Result Screen -->
    <div id="quizResult" class="quiz-result">
      <p style="color:var(--muted);font-size:13px;">Your Score</p>
      <div class="result-score" id="rScore">0%</div>
      <p class="result-label" id="rLabel">—</p>
      <div class="result-stats">
        <div class="stat-chip green" id="rCorrect">✓ 0 Correct</div>
        <div class="stat-chip red" id="rWrong">✗ 0 Wrong</div>
      </div>
      <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
    </div>

  </div>
</div>

<!-- Confirm Exit Modal -->
<div id="confirmModal" class="confirm-overlay" style="display:none;" onclick="closeConfirm(event)">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <p class="confirm-title">Leave Quiz?</p>
    <p class="confirm-msg">You've answered <strong id="confirmCount">0</strong> questions. Your progress will be lost.</p>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="closeConfirmModal()">Continue</button>
      <button class="confirm-yes" onclick="confirmExit()">Leave</button>

const LEC5_TF = [
  {type:'tf',q:'A peptide bond is formed between the alpha-carboxyl group of one amino acid and the alpha-amino group of another.',ans:true,exp:'This is the definition of a peptide bond. It is formed via a condensation (dehydration) reaction, releasing one molecule of water and forming a C-N covalent bond.'},
  {type:'tf',q:'Peptide bond formation is a hydration reaction that adds water to the two amino acids.',ans:false,exp:'It is a CONDENSATION (dehydration) reaction — it RELEASES one molecule of water (H2O), not adds it. Water is a product, not a reactant.'},
  {type:'tf',q:'The peptide bond is formally a double bond between carbon and nitrogen.',ans:false,exp:'The peptide bond is formally a SINGLE bond (C-N), but it has PARTIAL double-bond character due to resonance between C=O and C-N. It behaves partly like a double bond but is not a true double bond.'},
  {type:'tf',q:'Resonance in the peptide bond causes the protein backbone to have limited conformational freedom.',ans:true,exp:'The partial double-bond character from resonance restricts rotation around the C-N bond, giving the backbone limited conformations and creating the fixed planar geometry important for protein structure.'},
  {type:'tf',q:'In a planar peptide bond, only 4 atoms lie in the same plane.',ans:false,exp:'SIX atoms lie in the same plane in a planar peptide bond: Ca-C-O-N-H-Ca (the two alpha-carbons, carbonyl carbon, carbonyl oxygen, nitrogen, and amide hydrogen).'},
  {type:'tf',q:'The phi and psi angles are the only rotation angles allowed in the polypeptide backbone.',ans:true,exp:'Due to the planarity of the peptide bond (partial double-bond character), rotation around the C-N bond is restricted. Only rotations around the phi (N-Ca) and psi (Ca-C) bonds are allowed, enabling alpha-helix and beta-sheet formation.'},
  {type:'tf',q:'Approximately 99% of peptide bonds exist in the trans configuration.',ans:true,exp:'Trans configuration (adjacent alpha-carbons opposite each other) is energetically favored because it minimizes steric clash between bulky R-groups. Only ~1% exist in the cis configuration.'},
  {type:'tf',q:'In the cis configuration of a peptide bond, the adjacent alpha-carbons are on opposite sides.',ans:false,exp:'In the CIS configuration, adjacent alpha-carbons are on the SAME SIDE. In TRANS (99%), the alpha-carbons are on OPPOSITE sides.'},
  {type:'tf',q:'Polypeptide chains are synthesized from the C-terminus to the N-terminus.',ans:false,exp:'Polypeptide chains are synthesized from N-terminus (NH3+) to C-terminus (COO-). Ribosomes add amino acids in this direction, and proteins are also conventionally written N to C.'},
  {type:'tf',q:'Primary structure directly determines the secondary, tertiary, and quaternary structures of a protein.',ans:true,exp:'The linear sequence of amino acids (primary structure) dictates all higher-order folding. The sequence contains all the information needed for the protein to adopt its final 3D structure.'},
  {type:'tf',q:'A single amino acid substitution in the primary structure can never cause disease.',ans:false,exp:'A SINGLE amino acid change can cause serious disease. Classic example: sickle cell disease, where Glutamate (Glu) is replaced by Valine (Val) in the beta-chain of hemoglobin, causing sickling of RBCs.'},
  {type:'tf',q:'In sickle cell disease, the mutation Glu to Val creates abnormal hydrophobic interactions in hemoglobin.',ans:true,exp:'Valine is nonpolar/hydrophobic while Glutamate is charged/hydrophilic. Replacing Glu with Val creates a hydrophobic patch on the surface of hemoglobin that causes abnormal polymerization under low oxygen conditions.'},
  {type:'tf',q:'Secondary structure is stabilized primarily by hydrogen bonds between backbone carbonyl oxygens and amide hydrogens.',ans:true,exp:'Secondary structure (alpha-helices and beta-sheets) is stabilized MAINLY by hydrogen bonds between the C=O (carbonyl oxygen) of one peptide bond and the N-H (amide hydrogen) of another. These are backbone H-bonds, not side chain interactions.'},
  {type:'tf',q:'In an alpha-helix, hydrogen bonds form between the C=O of residue i and the N-H of residue i+3.',ans:false,exp:'In an alpha-helix, H-bonds form between C=O of residue i and N-H of residue i+4 (i plus FOUR, not three). This spacing of 4 residues creates 3.6 amino acids per turn. i+3 is the spacing in beta-turns, not alpha-helices.'},
  {type:'tf',q:'The alpha-helix is a right-handed helix where the chain twists clockwise when viewed from the N-terminus.',ans:true,exp:'The alpha-helix is right-handed, meaning it coils clockwise when viewed from the N-terminus looking toward the C-terminus. This is the standard and most energetically favorable orientation.'},
  {type:'tf',q:'In an alpha-helix, the R-groups (side chains) point inward toward the helical axis.',ans:false,exp:'R-groups (side chains) point OUTWARD from the helical axis. This reduces steric clash between side chains and allows them to interact with the environment or with other parts of the protein.'},
  {type:'tf',q:'Proline acts as a helix breaker because its rigid ring prevents the N-H hydrogen bond needed to maintain the helix.',ans:true,exp:'Proline has a rigid pyrrolidine ring that (1) cannot rotate freely around the N-Ca bond and (2) lacks an N-H hydrogen. Both properties interrupt the regular alpha-helix pattern, introducing a kink or break.'},
  {type:'tf',q:'In an antiparallel beta-sheet, adjacent strands run in the same direction (N to C and N to C).',ans:false,exp:'In ANTIPARALLEL beta-sheets, strands run in OPPOSITE directions (N-to-C and C-to-N). This creates straight H-bonds that are stronger and more stable. In PARALLEL sheets, strands run the SAME direction.'},
  {type:'tf',q:'Antiparallel beta-sheets have stronger hydrogen bonds than parallel beta-sheets.',ans:true,exp:'Antiparallel beta-sheets have STRAIGHT H-bonds aligned directly across the strands, making them STRONGER and more stable. Parallel sheets have ANGLED H-bonds that are slightly weaker. Antiparallel sheets are also more common.'},
  {type:'tf',q:'A beta-turn spans 4 amino acid residues and has a characteristic H-bond between residue i and residue i+3.',ans:true,exp:'Beta-turns are 4 residues long (i to i+3) and are stabilized by an H-bond between the C=O of residue i and the N-H of residue i+3. Glycine and Proline commonly appear at positions 2 and 3 of the turn.'},
  {type:'tf',q:'Glycine promotes beta-turns because of its large, bulky side chain.',ans:false,exp:'Glycine promotes beta-turns because it is the SMALLEST amino acid with NO side chain (only H). This gives it exceptional flexibility, allowing the sharp directional change required for a beta-turn. It is the opposite of bulky.'},
  {type:'tf',q:'A beta-hairpin consists of two parallel beta-strands connected by a short turn.',ans:false,exp:'A beta-hairpin consists of two ANTIPARALLEL beta-strands connected by a short turn (usually a beta-turn). The strands run in opposite directions because the connecting turn reverses the chain\'s direction.'},
  {type:'tf',q:'Loops are typically hydrophobic and buried in the protein interior.',ans:false,exp:'Loops are typically HYDROPHILIC (contain polar residues) and located on the PROTEIN SURFACE. This surface exposure makes them ideal for forming binding sites for ligands, substrates, and antibodies.'},
  {type:'tf',q:'Loops can participate in enzyme active sites and ligand binding.',ans:true,exp:'Loops are functionally important surface regions. They form binding sites for ligands, substrates, and antibodies, and catalytic loops directly participate in enzyme active sites. They are also common sites for post-translational modifications.'},
  {type:'tf',q:'Tertiary structure refers to the arrangement of multiple polypeptide chains in a protein.',ans:false,exp:'Tertiary structure = 3D shape of a SINGLE polypeptide chain. Multiple polypeptide chains = QUATERNARY structure. This is a very commonly tested distinction.'},
  {type:'tf',q:'Disulfide bonds are covalent bonds that contribute to the stability of tertiary and quaternary structure.',ans:true,exp:'Disulfide bonds (S-S) form between cysteine residues and are the ONLY covalent bonds (besides the backbone) that stabilize tertiary and quaternary structure. All other stabilizing forces are non-covalent.'},
  {type:'tf',q:'A protein with a single polypeptide chain can have quaternary structure.',ans:false,exp:'Quaternary structure REQUIRES two or more polypeptide chains (subunits). A monomeric protein (single chain) has primary, secondary, and tertiary structure but CANNOT have quaternary structure.'},
  {type:'tf',q:'Hemoglobin is an example of a homomeric quaternary structure.',ans:false,exp:'Hemoglobin is HETEROMERIC — it has DIFFERENT subunits (2 alpha-chains + 2 beta-chains = alpha2-beta2 tetramer). Homomeric means all subunits are IDENTICAL (e.g., beta-galactosidase homotetramer).'},
  {type:'tf',q:'Chaperones determine the final 3D structure of a protein.',ans:false,exp:'CHAPERONES do NOT determine the final structure. They ASSIST folding by preventing misfolding and aggregation. The final 3D structure is determined by the PRIMARY AMINO ACID SEQUENCE (Anfinsen\'s dogma).'},
  {type:'tf',q:'Hsp70 chaperones bind to nascent polypeptides emerging from ribosomes to prevent premature folding.',ans:true,exp:'Hsp70 is the first chaperone family to interact with newly synthesized proteins. They bind to exposed hydrophobic regions on nascent chains, preventing premature or incorrect folding before the full chain is synthesized.'},
];

const LEC5_MCQ = [
  {type:'mcq',q:'What type of chemical reaction forms a peptide bond?',opts:['Hydration reaction','Condensation (dehydration) reaction','Oxidation reaction','Phosphorylation reaction'],ans:1,exp:'Peptide bond formation is a condensation (dehydration) reaction. The alpha-carboxyl group of one amino acid reacts with the alpha-amino group of another, releasing one molecule of water (H2O) and forming the C-N peptide bond.'},

  {type:'mcq',q:'In sickle cell disease, which amino acid substitution occurs in hemoglobin?',opts:['Valine replaced by Glutamate in alpha-chain','Glutamate replaced by Valine in beta-chain','Glycine replaced by Proline in beta-chain','Alanine replaced by Leucine in alpha-chain'],ans:1,exp:'The mutation in sickle cell disease is Glutamate (Glu, polar/charged) replaced by Valine (Val, nonpolar/hydrophobic) at position 6 of the hemoglobin BETA-chain. This creates a hydrophobic patch causing polymerization and sickling under low O2.'},
  {type:'mcq',q:'Secondary structure is PRIMARILY stabilized by which type of bond?',opts:['Covalent peptide bonds','Disulfide bonds between cysteines','Hydrogen bonds between backbone C=O and N-H groups','Ionic interactions between charged side chains'],ans:2,exp:'Secondary structure (alpha-helices and beta-sheets) is stabilized PRIMARILY by backbone H-bonds between the carbonyl oxygen (C=O) of one peptide unit and the amide hydrogen (N-H) of another.'},
  {type:'mcq',q:'In an alpha-helix, a hydrogen bond forms between residue i and residue:',opts:['i+1','i+2','i+3','i+4'],ans:3,exp:'In an alpha-helix, H-bonds form between the C=O of residue i and the N-H of residue i+4. This spacing creates 3.6 amino acids per turn. Remember: i+3 is for BETA-TURNS, i+4 is for ALPHA-HELICES.'},
  {type:'mcq',q:'How many amino acids are in one complete turn of an alpha-helix?',opts:['2.0','3.0','3.6','4.5'],ans:2,exp:'An alpha-helix has exactly 3.6 amino acids per turn. This creates the characteristic compact, uniform helical shape with H-bonds between every 4th residue (i to i+4).'},
  {type:'mcq',q:'Which amino acid is known as a helix BREAKER because its rigid ring prevents backbone hydrogen bonding?',opts:['Alanine','Leucine','Proline','Glutamate'],ans:2,exp:'Proline is the classic helix breaker. Its pyrrolidine ring (1) prevents rotation around the N-Ca bond and (2) eliminates the amide N-H needed for H-bond donation in the helix. It introduces a kink or break.'},
  {type:'mcq',q:'Where do the R-groups (side chains) point in an alpha-helix?',opts:['Inward toward the helical axis','Outward away from the helical axis','Alternating in and out','Perpendicular to the helix backbone only'],ans:1,exp:'In an alpha-helix, all R-groups point OUTWARD from the helical axis. This reduces steric clashes between side chains and allows them to interact with the protein environment, other helices, or ligands.'},
  {type:'mcq',q:'A parallel beta-sheet differs from an antiparallel beta-sheet in that its H-bonds are:',opts:['Straight and stronger','Angled and slightly weaker','Perpendicular to the strand direction','Absent — held by ionic interactions instead'],ans:1,exp:'In PARALLEL beta-sheets, strands run in the same direction (N to C), causing H-bonds to be ANGLED — not perpendicular to the strand. These angled H-bonds are slightly WEAKER and less stable than the straight H-bonds in antiparallel sheets.'},
  {type:'mcq',q:'Which type of beta-sheet is described as more stable and more common?',opts:['Parallel','Antiparallel','Mixed','Both are equally stable'],ans:1,exp:'ANTIPARALLEL beta-sheets are more stable because their H-bonds are STRAIGHT (aligned perpendicular to the strand direction), making them stronger. They are also more commonly found in proteins.'},
  {type:'mcq',q:'A beta-turn spans how many amino acid residues?',opts:['2 residues','3 residues','4 residues','6-16 residues'],ans:2,exp:'A beta-turn spans exactly 4 amino acid residues (from residue i to residue i+3). It forms a tight 180-degree change in direction of the polypeptide chain, stabilized by an H-bond between C=O of residue i and N-H of residue i+3.'},
  {type:'mcq',q:'Why is Proline commonly found in beta-turns?',opts:['Its large R-group provides stability','Its rigid ring forces the backbone to bend','It forms extra H-bonds in the turn','It is the only amino acid without an R-group'],ans:1,exp:'Proline\'s rigid pyrrolidine ring constrains the backbone conformation, forcing a bend in the polypeptide chain. This makes it ideal for beta-turns and other sharp direction changes.'},
  {type:'mcq',q:'What distinguishes a beta-hairpin from a simple beta-turn?',opts:['A hairpin uses parallel strands; a turn uses antiparallel strands','A hairpin connects two antiparallel beta-strands; a turn just reverses chain direction','A hairpin has no H-bonds; a turn has one','A hairpin spans 8 residues; a turn spans 4'],ans:1,exp:'A beta-hairpin is a structural MOTIF consisting of two ANTIPARALLEL beta-strands connected by a short turn (usually a beta-turn). The turn reverses the chain direction, allowing the returning strand to run antiparallel.'},
  {type:'mcq',q:'Loops are characterized by all of the following EXCEPT:',opts:['Irregular, flexible structure','Location on the protein surface','Hydrophilic character','Regular repeating hydrogen-bonding patterns'],ans:3,exp:'Loops do NOT form regular H-bonding patterns — that is what makes them loops rather than helices or sheets. They are irregular, flexible, surface-located, and hydrophilic. Their lack of regular H-bonds gives them functional flexibility for binding and catalysis.'},
  {type:'mcq',q:'The overall 3D shape of a SINGLE polypeptide chain is referred to as its:',opts:['Primary structure','Secondary structure','Tertiary structure','Quaternary structure'],ans:2,exp:'TERTIARY structure = overall 3D shape of a single polypeptide chain, resulting from the folding of secondary structures (alpha-helices, beta-sheets, loops) stabilized by hydrophobic interactions, H-bonds, ionic interactions, disulfide bonds, and vdW forces.'},
  {type:'mcq',q:'Which level of structural organization distinguishes motifs from domains?',opts:['Motifs are larger than domains','Motifs are small combinations of secondary structures; domains are large independently folding functional units','Motifs fold independently; domains do not','Domains are found only in membrane proteins'],ans:1,exp:'MOTIFS are small, recognizable combinations of secondary structure elements (e.g., helix-turn-helix). DOMAINS are large (100-300 AA), independently folding structural AND functional units with specific functions.'},
  {type:'mcq',q:'Which interaction is considered the MOST IMPORTANT driving force for tertiary structure?',opts:['Hydrogen bonds','Ionic interactions','Hydrophobic interactions','Disulfide bonds'],ans:2,exp:'Hydrophobic interactions are the MOST IMPORTANT driving force for tertiary structure. Hydrophobic R-groups cluster in the protein core away from water (hydrophobic collapse), providing the major thermodynamic driving force for folding.'},
  {type:'mcq',q:'Which type of bond is the ONLY covalent stabilizer of tertiary structure besides the peptide backbone?',opts:['Hydrogen bonds','Ionic bonds','Disulfide bonds','Van der Waals bonds'],ans:2,exp:'DISULFIDE BONDS (S-S bonds) between cysteine residues are the only covalent stabilizing interactions (besides the backbone peptide bonds themselves). All other stabilizing forces in tertiary structure are NON-covalent.'},
  {type:'mcq',q:'Quaternary structure requires:',opts:['At least one alpha-helix','Disulfide bonds between all subunits','Two or more polypeptide chains (subunits)','A minimum molecular weight of 100 kDa'],ans:2,exp:'Quaternary structure REQUIRES two or more polypeptide subunits assembled together. A monomeric protein has no quaternary structure regardless of its complexity.'},
  {type:'mcq',q:'A protein consisting of two identical subunits is described as:',opts:['Heteromeric','Homomeric','Monomeric','Oligomeric only'],ans:1,exp:'HOMOMERIC = identical subunits. HETEROMERIC = different subunits. Hemoglobin (2 alpha + 2 beta chains) is heteromeric. Beta-galactosidase (4 identical subunits) is homomeric.'},
  {type:'mcq',q:'Hemoglobin\'s quaternary structure is best described as:',opts:['Homodimer (2 identical chains)','Homotrimer (3 identical chains)','Heterotetramer (2 alpha + 2 beta chains)','Single polypeptide with 4 domains'],ans:2,exp:'Hemoglobin is an alpha2-beta2 HETEROTETRAMER: 2 alpha-chains + 2 beta-chains. Because it has different types of subunits, it is HETEROMERIC. This quaternary structure enables cooperative oxygen binding and the Bohr effect.'},
  {type:'mcq',q:'Collagen has an unusual quaternary structure consisting of:',opts:['A beta-sandwich of 4 chains','A triple helix of 3 polypeptide chains','A homotrimer of alpha-helices','Two antiparallel beta-sheets'],ans:1,exp:'Collagen has a TRIPLE HELIX quaternary structure — three polypeptide chains twisted around each other. Each individual chain is a left-handed helix rich in Gly-Pro-Hyp repeats, and three chains together form the right-handed triple helix.'},
  {type:'mcq',q:'What is the primary role of molecular chaperones in protein biology?',opts:['To determine the amino acid sequence of proteins','To catalyze peptide bond formation','To assist proteins in folding correctly and prevent misfolding/aggregation','To cleave proteins into smaller fragments'],ans:2,exp:'Chaperones ASSIST proteins in folding correctly. They prevent misfolding, prevent aggregation, help refold damaged proteins, and target irreversibly damaged proteins to the proteasome. They do NOT determine the final structure.'},
  {type:'mcq',q:'Hsp60/Chaperonins differ from Hsp70 chaperones in that they:',opts:['Bind to proteins after they are fully folded','Provide an isolated chamber that encapsulates the protein for folding','Only function during heat stress','Directly cleave misfolded proteins'],ans:1,exp:'Chaperonins (Hsp60 family) form large barrel-shaped complexes that provide an isolated folding CHAMBER. The misfolded protein enters the barrel and folds in this protected environment, away from the crowded cellular environment that would promote aggregation.'},
  {type:'mcq',q:'Hsp90 specifically assists in the folding of:',opts:['Structural proteins like collagen','Signaling proteins such as kinases and steroid receptors','Ribosomal RNA','All newly synthesized proteins at the ribosome'],ans:1,exp:'Hsp90 specifically assists in folding SIGNALING PROTEINS, particularly kinases and steroid hormone receptors. It is important for maintaining these proteins in a conformation competent for signal transduction.'},
  {type:'mcq',q:'What happens to irreversibly misfolded proteins that cannot be refolded by chaperones?',opts:['They are secreted from the cell','They are targeted to the proteasome for degradation','They spontaneously refold given enough time','They are stored in lipid droplets'],ans:1,exp:'Chaperones that cannot rescue misfolded proteins direct them to the PROTEASOME for degradation. This quality-control mechanism prevents accumulation of toxic misfolded protein aggregates (which cause diseases like Alzheimer\'s and Parkinson\'s).'},
  {type:'mcq',q:'Which statement about protein folding is CORRECT?',opts:['Chaperones determine the final 3D structure','The primary amino acid sequence determines the final structure; chaperones only assist','Secondary structure determines the primary sequence','Quaternary structure is determined by RNA'],ans:1,exp:'The PRIMARY AMINO ACID SEQUENCE (primary structure) contains all the information needed to determine the final 3D structure — this is Anfinsen\'s dogma. Chaperones ASSIST the folding process and prevent off-pathway aggregation, but they do NOT specify which structure forms.'},
];

const LEC6_MCQ = [
  {type:'mcq',q:'Protein denaturation is defined as loss of native 3D structure due to disruption of:',opts:['Peptide bonds','Non-covalent interactions','Disulfide bonds only','The primary sequence'],ans:1,exp:'Denaturation disrupts NON-COVALENT interactions (H-bonds, ionic, hydrophobic, Van der Waals). Peptide bonds (primary structure) remain INTACT.'},
  {type:'mcq',q:'Which of the following is a consequence of protein denaturation?',opts:['Formation of new peptide bonds','Increased enzyme activity','Loss of biological function and solubility','Stabilization of the 3D structure'],ans:2,exp:'Consequences include: loss of biological function (inactive enzyme), loss of solubility, exposure of hydrophobic residues, and possible aggregation/precipitation.'},
  {type:'mcq',q:'Which physical agent denatures proteins by increasing molecular motion and breaking weak interactions?',opts:['Urea','Beta-mercaptoethanol','Heat','SDS'],ans:2,exp:'Heat increases molecular motion → breaks hydrogen bonds, hydrophobic, and ionic interactions → denaturation. Classic examples: egg cooking, fever, hot sterilization.'},
  {type:'mcq',q:'Gastric acidity (low pH) denatures dietary proteins by:',opts:['Breaking disulfide bonds','Disrupting hydrophobic interactions','Altering ionization of AA side chains — disrupting electrostatic interactions','Adding phosphate groups'],ans:2,exp:'pH changes alter the ionization state of amino acid side chains → disrupt electrostatic (ionic) interactions → denaturation of dietary proteins in stomach.'},
  {type:'mcq',q:'Which agent specifically breaks DISULFIDE BONDS in proteins?',opts:['Heat','Urea','SDS (sodium dodecyl sulfate)','Beta-mercaptoethanol (beta-ME) or DTT'],ans:3,exp:'Only REDUCING AGENTS (beta-ME, DTT) break disulfide bonds — which are covalent bonds. Heat, urea, and SDS target non-covalent interactions only.'},
  {type:'mcq',q:'SDS (sodium dodecyl sulfate) denatures proteins by:',opts:['Breaking peptide bonds','Disrupting hydrogen bonds','Coating proteins with negative charges — disrupting hydrophobic interactions','Oxidizing SH groups'],ans:2,exp:'SDS is a detergent that disrupts HYDROPHOBIC INTERACTIONS and coats proteins with uniform negative charges → unfolds and linearizes the protein. Used in SDS-PAGE.'},
  {type:'mcq',q:'Urea and guanidine hydrochloride are classified as chaotropic agents that denature proteins by:',opts:['Breaking disulfide bonds','Disrupting hydrogen bonds','Oxidizing amino acids','Adding phosphate to the protein'],ans:1,exp:'Chaotropic agents (urea, guanidine HCl) are classic laboratory denaturants that disrupt HYDROGEN BONDS in protein structure.'},
  {type:'mcq',q:'The classic example of REVERSIBLE protein denaturation is:',opts:['Cooked egg white','RNase A refolding experiment','Boiled milk','Hair straightening with heat'],ans:1,exp:'RNase A (ribonuclease A) refolding experiments by Anfinsen demonstrated that some proteins can fully refold after denaturation when the denaturant is removed — classic reversible denaturation.'},
  {type:'mcq',q:'Proteins that yield ONLY amino acids on hydrolysis with no prosthetic group are called:',opts:['Conjugated proteins','Glycoproteins','Simple proteins','Lipoproteins'],ans:2,exp:'Simple proteins yield ONLY amino acids on hydrolysis. They have NO prosthetic group. Examples: albumins, globulins, histones, keratin.'},

  {type:'mcq',q:'Fibrous proteins differ from globular proteins in that they are:',opts:['Spherical, compact, and soluble','Long, rod-like, insoluble, and mainly structural','Always enzymes','Always conjugated with lipids'],ans:1,exp:'Fibrous proteins are long, rod-like, and INSOLUBLE with STRUCTURAL roles. Examples: collagen, elastin, keratin, fibrin. Globular proteins are spherical, soluble, and functional.'},
  {type:'mcq',q:'Hemoglobin is classified as which type based on shape AND composition?',opts:['Fibrous and simple','Globular and conjugated (chromoprotein)','Fibrous and conjugated','Globular and simple'],ans:1,exp:'Hemoglobin is GLOBULAR (spherical, functional/transport protein) AND CONJUGATED — specifically a chromoprotein (prosthetic group = heme containing Fe2+).'},
  {type:'mcq',q:'Ferritin and casein are classified as which functional type of protein?',opts:['Structural proteins','Transport proteins','Storage proteins','Contractile proteins'],ans:2,exp:'Storage proteins store essential nutrients. FERRITIN stores iron; CASEIN stores nutrients in milk. Other storage examples: ovalbumin (egg).'},
  {type:'mcq',q:'Gelatin is an example of which nutritional class of protein?',opts:['Complete protein','Partially complete protein','Incomplete protein','Essential protein'],ans:2,exp:'Gelatin is an INCOMPLETE protein — it lacks several essential amino acids and cannot support growth or maintenance alone. Zein (corn protein) is another example.'},
  {type:'mcq',q:'Which of the following assists correct protein refolding after denaturation?',opts:['Reducing agents','Chaotropic agents','Chaperones','Detergents'],ans:2,exp:'CHAPERONES are proteins that assist correct protein refolding by preventing misfolding and aggregation. They determine whether denaturation is reversible or irreversible.'},
];

const LEC7_MCQ = [
  {type:'mcq',q:'Which of the following is NOT included in protein metabolism?',opts:['Digestion of dietary proteins into amino acids','Storage of excess amino acids as protein reserves','Catabolism of excess amino acids via deamination','Absorption and transport of amino acids in body fluids'],ans:1,exp:'Proteins are NOT stored in the body. Unlike carbohydrates (stored as glycogen) and fats (stored in adipose tissue), excess amino acids are metabolized through deamination, and the nitrogen is excreted as urea.'},
  {type:'mcq',q:'What is the main form in which excess nitrogen is excreted from the body?',opts:['Ammonia','Creatinine','Urea','Uric acid'],ans:2,exp:'Excess nitrogen from amino acid catabolism is converted to UREA in the liver (via the urea cycle) and excreted by the kidneys in urine. Ammonia is toxic and is converted to urea to allow safe excretion.'},
  {type:'mcq',q:'A patient recovering from surgery shows nitrogen intake greater than nitrogen loss. This represents:',opts:['Negative nitrogen balance','Zero nitrogen balance','Positive nitrogen balance','Normal adult equilibrium'],ans:2,exp:'Positive nitrogen balance = nitrogen INTAKE > nitrogen LOSS. This occurs when the body is building new proteins (anabolic states): growth, pregnancy, lactation, and recovery from illness or surgery.'},
  {type:'mcq',q:'The recommended daily protein intake for a healthy adult is approximately:',opts:['0.3–0.5 g/kg/day','0.8–1.0 g/kg/day','1.5–2.0 g/kg/day','2.5–3.0 g/kg/day'],ans:1,exp:'The average protein requirement for a healthy adult is 0.8–1.0 g/kg body weight/day. Higher amounts are needed during pregnancy, lactation, infancy, childhood, adolescence, illness, trauma, and burns.'},
  {type:'mcq',q:'Protein digestion BEGINS in which location?',opts:['Mouth','Esophagus','Stomach','Small intestine'],ans:2,exp:'Protein digestion begins in the STOMACH. The mouth has NO protein-digesting enzymes (only salivary amylase for carbohydrates). The stomach produces HCl and pepsin, which initiate protein breakdown.'},
  {type:'mcq',q:'Which hormone is released by gastric mucosal G cells in response to protein entering the stomach?',opts:['Secretin','Cholecystokinin','Gastrin','Insulin'],ans:2,exp:'GASTRIN is released by G cells (gastric mucosal cells) when proteins enter the stomach. Gastrin then stimulates the secretion of gastric juice containing HCl and pepsinogen. Secretin and CCK are intestinal hormones.'},
  {type:'mcq',q:'What is the pH of gastric juice during active digestion?',opts:['6.0–7.0','4.0–5.0','1.5–2.5','7.5–8.0'],ans:2,exp:'Gastric juice has a pH of 1.5–2.5 (highly acidic). This acidic environment is optimal for pepsin activity and denatures dietary proteins, making them more susceptible to enzymatic digestion.'},
  {type:'mcq',q:'HCl in the stomach serves which function in protein digestion?',opts:['Directly digests proteins by cleaving peptide bonds','Denatures proteins and activates pepsinogen to pepsin','Activates trypsin in the stomach','Neutralizes the alkaline environment'],ans:1,exp:'HCl has TWO main roles: (1) It DENATURES proteins by unfolding their 3D structure. (2) It ACTIVATES pepsinogen → pepsin. HCl does NOT cleave peptide bonds itself — that is pepsin\'s job.'},
  {type:'mcq',q:'Pepsin is classified as which type of protease?',opts:['Exopeptidase — removes terminal amino acids','Endopeptidase — cleaves internal peptide bonds','Dipeptidase — cleaves dipeptides only','Aminopeptidase — cleaves at the amino terminus'],ans:1,exp:'Pepsin is an ENDOPEPTIDASE — it cleaves INTERNAL peptide bonds within a protein chain, generating large polypeptide fragments (proteoses and peptones).'},
  {type:'mcq',q:'Rennin is a gastric enzyme that:',opts:['Activates trypsinogen in infants','Coagulates milk proteins and is present in infants','Digests all dietary proteins in adults','Is the active form of pepsinogen'],ans:1,exp:'Rennin (chymosin) coagulates milk proteins (casein), slowing their passage through the stomach and allowing more complete digestion. It is present in INFANTS but not significant in adults.'},
  {type:'mcq',q:'Which intestinal hormone stimulates the pancreas to secrete bicarbonate to neutralize HCl?',opts:['Gastrin','Cholecystokinin (CCK)','Secretin','Glucagon'],ans:2,exp:'SECRETIN is released by duodenal mucosal cells in response to the low pH of acidic chyme. Secretin stimulates the pancreas to secrete bicarbonate (HCO3-), which neutralizes the acid, raising intestinal pH from ~2 to ~7.'},
  {type:'mcq',q:'Which hormone stimulates the release of pancreatic proteases into the duodenum?',opts:['Secretin','Gastrin','Cholecystokinin (CCK)','Insulin'],ans:2,exp:'CCK (Cholecystokinin) is released by duodenal cells in response to proteins and fats. It stimulates the pancreas to secrete proteolytic enzymes (trypsinogen, chymotrypsinogen, proelastase, procarboxypeptidase).'},
  {type:'mcq',q:'The enzyme enteropeptidase (enterokinase) is located on the:',opts:['Pancreatic acinar cells','Gastric mucosal cells','Brush border of the small intestine','Liver sinusoids'],ans:2,exp:'Enteropeptidase (enterokinase) is located on the BRUSH BORDER (microvilli) of the small intestine\'s epithelial cells. It catalyzes the activation of trypsinogen → trypsin, the KEY REGULATORY STEP in the pancreatic enzyme activation cascade.'},
  {type:'mcq',q:'Once trypsin is activated, it serves as a master activator by activating all of the following EXCEPT:',opts:['Chymotrypsinogen → chymotrypsin','Proelastase → elastase','Pepsinogen → pepsin','Procarboxypeptidase → carboxypeptidase'],ans:2,exp:'Trypsin activates: chymotrypsinogen, proelastase, procarboxypeptidase, and more trypsinogen. Pepsinogen → pepsin is activated by HCl in the STOMACH — it is not part of the intestinal pancreatic cascade.'},
  {type:'mcq',q:'Which of the following pancreatic enzymes is an exopeptidase?',opts:['Trypsin','Chymotrypsin','Elastase','Carboxypeptidase'],ans:3,exp:'Carboxypeptidase is an EXOPEPTIDASE — it removes amino acids from the CARBOXYL (C-terminal) end of peptide chains. Trypsin, chymotrypsin, and elastase are all endopeptidases that cleave INTERNAL peptide bonds.'},
  {type:'mcq',q:'Why are pancreatic enzymes secreted as inactive zymogens?',opts:['To reduce energy expenditure in the pancreas','To prevent self-digestion (autodigestion) of the pancreas','Because they require stomach acid to function','To allow selective activation in the liver'],ans:1,exp:'Pancreatic proteases are secreted as inactive zymogens to prevent AUTODIGESTION of the pancreas itself. Premature activation of zymogens within the pancreas leads to acute pancreatitis.'},
  {type:'mcq',q:'What are the end products of protein digestion in the small intestine that are ready for absorption?',opts:['Large polypeptides only','Proteoses and peptones','Amino acids, dipeptides, and tripeptides','Glucose and fatty acids'],ans:2,exp:'The final products of protein digestion ready for absorption are: free amino acids, dipeptides (2 AAs), and tripeptides (3 AAs). These small molecules can be transported across the intestinal epithelium.'},
  {type:'mcq',q:'The PRIMARY site of amino acid absorption is the:',opts:['Duodenum','Jejunum','Ileum','Colon'],ans:1,exp:'The JEJUNUM is the primary site of amino acid absorption. It has the largest surface area and most abundant transport proteins. The ileum serves as a secondary/backup absorption site.'},
  {type:'mcq',q:'Free amino acids are absorbed across the apical membrane of enterocytes primarily by:',opts:['Simple diffusion','Na+-dependent secondary active transport','PEPT-1 (H+-dependent transporter)','Osmosis'],ans:1,exp:'Most free amino acids are absorbed by Na+-DEPENDENT SECONDARY ACTIVE TRANSPORT. The Na+/K+ ATPase maintains a low intracellular Na+. Na+ then flows back into the cell, carrying amino acids along against their concentration gradient.'},
  {type:'mcq',q:'The PEPT-1 transporter absorbs dipeptides and tripeptides using which ion gradient?',opts:['Na+ gradient','K+ gradient','H+ (proton) gradient','Cl- gradient'],ans:2,exp:'PEPT-1 (SLC15A1) uses a PROTON (H+) gradient, NOT Na+. Once inside the enterocyte, the absorbed di/tripeptides are hydrolyzed into free amino acids by intracellular peptidases before entering the bloodstream.'},
  {type:'mcq',q:'After absorption, amino acids enter the portal vein and are first transported to the:',opts:['Kidneys','Brain','Liver','Heart'],ans:2,exp:'After absorption across the basolateral membrane, amino acids enter the PORTAL VEIN and are transported FIRST to the LIVER. The liver then distributes amino acids to other tissues or metabolizes them.'},
  {type:'mcq',q:'Which of the following correctly differentiates endopeptidases from exopeptidases?',opts:['Endopeptidases work in the stomach; exopeptidases work in the intestine','Endopeptidases cleave internal bonds; exopeptidases remove terminal amino acids','Endopeptidases require Na+; exopeptidases require H+','Endopeptidases produce free amino acids; exopeptidases produce polypeptides'],ans:1,exp:'ENDOPEPTIDASES cleave INTERNAL peptide bonds within a polypeptide chain, producing smaller fragments. EXOPEPTIDASES remove amino acids one at a time from the ENDS of a peptide chain.'},
  {type:'mcq',q:'A child with a deficiency of enteropeptidase (enterokinase) would most likely have:',opts:['Inability to digest carbohydrates','Impaired activation of all pancreatic proteases — protein malabsorption','Failure to absorb fat-soluble vitamins','Deficiency of HCl secretion'],ans:1,exp:'Enteropeptidase deficiency would prevent trypsinogen → trypsin activation. Since trypsin is the MASTER ACTIVATOR of all pancreatic zymogens, the entire pancreatic protease cascade would fail → severe protein malabsorption.'},
  {type:'mcq',q:'What is the amino acid pool?',opts:['The protein stored in the liver','Total free amino acids in body fluids and cells — a dynamic balance','The amount of amino acids absorbed per day','The reserve of essential amino acids in muscle'],ans:1,exp:'The amino acid pool is the total FREE amino acids present in body fluids and cells at any given time. It is a DYNAMIC balance — constantly supplied by dietary protein digestion, protein turnover, and biosynthesis.'},

  {type:'mcq',q:'Which of the following correctly defines a carbohydrate?',opts:['Compounds containing only carbon and hydrogen','Polyhydroxy aldehydes or ketones, or substances yielding them on hydrolysis','Any organic compound soluble in water','Compounds with the formula CnH2n'],ans:1,exp:'Carbohydrates are defined as polyhydroxy aldehydes or ketones, OR substances that yield such compounds upon hydrolysis. This two-part definition includes monosaccharides (direct aldehydes/ketones) and complex carbohydrates (which produce them when hydrolyzed).'},

  {type:'mcq',q:'Jaundice is defined as total bilirubin above:',opts:['1 mg/dL','2 mg/dL','3 mg/dL','5 mg/dL'],ans:1,exp:'Jaundice = hyperbilirubinemia >2 mg/dL → yellow discoloration of skin and sclera.'},
  {type:'mcq',q:'Physiological jaundice of newborn is a type of:',opts:['Conjugated hyperbilirubinemia','Mixed hyperbilirubinemia','Unconjugated hyperbilirubinemia','Obstructive jaundice'],ans:2,exp:'Neonatal jaundice is unconjugated (immature liver cannot conjugate adequately).'},
  {type:'mcq',q:'Gilbert disease is classified as:',opts:['Conjugated hyperbilirubinemia','Obstructive jaundice','Unconjugated hyperbilirubinemia','Hemolytic jaundice'],ans:2,exp:'Gilbert disease = congenital deficiency of glucuronyl transferase → unconjugated hyperbilirubinemia.'},
  {type:'mcq',q:'Obstructive jaundice is an example of:',opts:['Unconjugated hyperbilirubinemia','Conjugated hyperbilirubinemia','Hemolytic jaundice','Physiological jaundice'],ans:1,exp:'Bile duct obstruction → conjugated bilirubin cannot be excreted → backs up into blood.'},
  {type:'mcq',q:'Viral hepatitis causes which type of jaundice?',opts:['Unconjugated only','Conjugated only','Mixed hyperbilirubinemia','Obstructive only'],ans:2,exp:'Toxic and viral hepatitis → both conjugated and unconjugated → mixed hyperbilirubinemia.'},
  {type:'mcq',q:'RBCs use which pathway as their ONLY source of energy?',opts:['TCA cycle','Beta-oxidation','Glycolysis','HMP shunt'],ans:2,exp:'RBCs lack mitochondria → cannot do oxidative phosphorylation → glycolysis only.'},
  {type:'mcq',q:'RBCs lack mitochondria; glycolysis provides NADH mainly for:',opts:['ATP synthesis','Reduction of hemoglobin (Hb)','Lipid synthesis','DNA synthesis'],ans:1,exp:'NADH from glycolysis is used to reduce met-Hb (Fe3+) back to normal Hb (Fe2+).'},
  {type:'mcq',q:'2,3-BPG produced in RBCs stands for:',opts:['2,3-Bisphosphoglycerate','2,3-Bisphosphoglucose','2,3-Biphosphoglycol','2,3-Bisphosphoguanidine'],ans:0,exp:'2,3-BPG (from glycolysis in RBCs) reduces Hb affinity for O2 → promotes O2 release to tissues.'},
  {type:'mcq',q:'HMP shunt (hexose monophosphate pathway) in RBCs provides:',opts:['ATP','NADH','NADPH','GTP'],ans:2,exp:'HMP shunt provides NADPH to maintain glutathione in reduced form → protects RBC from oxidative damage.'},
  {type:'mcq',q:'Which enzyme in RBCs protects against CO2 accumulation?',opts:['Catalase','Carbonic anhydrase','Rhodanase','Peptidase'],ans:1,exp:'Carbonic anhydrase catalyzes CO2 + H2O → H2CO3 → efficient CO2 transport from tissues.'},
  {type:'mcq',q:'Normal daily volume of saliva is:',opts:['0.5 L/day','1.0 L/day','1.5 L/day','2.0 L/day'],ans:2,exp:'Normal saliva volume = 1.5 L/day.'},
  {type:'mcq',q:'Average pH of saliva is:',opts:['5.5','6.7','7.4','8.0'],ans:1,exp:'Saliva pH = average 6.7 (slightly acidic to neutral).'},
  {type:'mcq',q:'Water content of saliva is:',opts:['90%','95%','99.4%','80%'],ans:2,exp:'Saliva = 99.4% water + 0.6% solids (0.4% organic + 0.2% inorganic).'},
  {type:'mcq',q:'Mucin in saliva is secreted by which glands?',opts:['Parotid gland','Submaxillary and sublingual glands','Thyroid gland','Lacrimal gland'],ans:1,exp:'Mucin (gives viscosity, lubricates food bolus) = secreted by submaxillary + sublingual glands.'},
  {type:'mcq',q:'Ptyalin (salivary amylase) is secreted by which gland?',opts:['Sublingual gland','Submaxillary gland','Parotid gland','Minor salivary glands'],ans:2,exp:'Ptyalin = salivary amylase, secreted by the parotid gland.'},
  {type:'mcq',q:'Ptyalin is activated by:',opts:['Na+','Cl-','HCO3-','PO43-'],ans:1,exp:'Ptyalin (salivary amylase) is activated by Cl- and stabilized by Ca2+.'},
  {type:'mcq',q:'Optimal pH for ptyalin activity is:',opts:['4.0','5.5','7.0','8.5'],ans:2,exp:'Ptyalin has optimal activity at pH 7 (neutral), consistent with salivary pH.'},
  {type:'mcq',q:'Ptyalin hydrolyzes which type of glycosidic bond?',opts:['Alpha 1,6 glucosidic bond','Beta 1,4 glucosidic bond','Alpha 1,4 glucosidic bond','Beta 1,6 glucosidic bond'],ans:2,exp:'Ptyalin (alpha-amylase) cleaves alpha-1,4 glycosidic bonds in starch/glycogen.'},
  {type:'mcq',q:'When saliva stands, CO2 is lost → saliva becomes alkaline → this leads to precipitation of:',opts:['Uric acid crystals','Calcium phosphate (tartar)','Bilirubin','Cholesterol'],ans:1,exp:'CO2 loss → alkaline pH → Ca phosphate precipitates → forms tartar (dental calculus). Clinically important for dentistry!'},
];

const PRAC_ALL = [...PRAC_MCQ];
const ALL_QUESTIONS = [...LEC34_ALL,...LEC5_ALL,...LEC6_ALL,...LEC7_ALL,...LEC8_ALL,...LEC9_ALL,...ENZ1_ALL,...ENZ2_ALL,...PRAC_ALL];

let quizDeck = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizAnswered = false;
let currentFilter = 'lec34';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = {
    lec34: ['⚡ Start Lectures 3 & 4 Quiz', '50 questions — shuffled'],
    lec5:  ['⚡ Start Lecture 5 Quiz', '60 questions — shuffled'],
    lec6:  ['⚡ Start Lecture 6 Quiz', '30 questions — shuffled'],
    lec7:  ['⚡ Start Lecture 7 Quiz', '50 questions — shuffled'],
    lec8:  ['⚡ Start Lecture 8 Quiz', '40 questions — shuffled'],
    lec9:  ['⚡ Start Lecture 9 Quiz', '55 questions — shuffled'],
    enz1:  ['⚡ Start Enzymology Part 1 Quiz', '45 questions — shuffled'],
    enz2:  ['⚡ Start Enzymology Part 2 Quiz', '45 questions — shuffled'],
    prac:  ['⚡ Start Practical Exam Quiz', '80 questions — shuffled'],
    all:   ['⚡ Start Full Bank Quiz', '455 questions — shuffled'],
    tf:    ['⚡ Start True / False Quiz', '175 T/F questions — shuffled'],
    mcq:   ['⚡ Start MCQ Quiz', '280 MCQ questions — shuffled'],
  };
  const [label, sub] = labels[f] || labels.lec34;
  document.getElementById('startBtnLabel').textContent = label;
  document.getElementById('startBtnSub').textContent = sub;
  exitToMenu();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(mode) {
  if (currentFilter === 'lec5') quizDeck = shuffle([...LEC5_ALL]);
  else if (currentFilter === 'lec6') quizDeck = shuffle([...LEC6_ALL]);
  else if (currentFilter === 'lec7') quizDeck = shuffle([...LEC7_ALL]);
  else if (currentFilter === 'lec8') quizDeck = shuffle([...LEC8_ALL]);
  else if (currentFilter === 'lec9') quizDeck = shuffle([...LEC9_ALL]);
  else if (currentFilter === 'enz1') quizDeck = shuffle([...ENZ1_ALL]);
  else if (currentFilter === 'enz2') quizDeck = shuffle([...ENZ2_ALL]);
  else if (currentFilter === 'prac') quizDeck = shuffle([...PRAC_ALL]);
  else if (currentFilter === 'all') quizDeck = shuffle([...ALL_QUESTIONS]);
  else if (currentFilter === 'tf') quizDeck = shuffle([...LEC34_TF,...LEC5_TF,...LEC6_TF,...LEC7_TF,...LEC8_TF,...LEC9_TF,...ENZ1_TF,...ENZ2_TF]);
  else if (currentFilter === 'mcq') quizDeck = shuffle([...LEC34_MCQ,...LEC5_MCQ,...LEC6_MCQ,...LEC7_MCQ,...LEC8_MCQ,...LEC9_MCQ,...ENZ1_MCQ,...ENZ2_MCQ,...PRAC_MCQ]);
  else quizDeck = shuffle([...LEC34_ALL]);

  quizIndex = 0;
  quizCorrect = 0;
  quizAnswered = false;

  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizActive').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = quizDeck[quizIndex];
  quizAnswered = false;

  document.getElementById('qNum').textContent = 'Q' + (quizIndex + 1) + ' / ' + quizDeck.length;
  document.getElementById('qScore').textContent = '✓ ' + quizCorrect;
  document.getElementById('qProgress').style.width = ((quizIndex / quizDeck.length) * 100) + '%';

  const badge = document.getElementById('qTypeBadge');
  badge.className = 'quiz-type-badge ' + q.type;
  badge.textContent = q.type === 'tf' ? 'TRUE / FALSE' : 'MCQ';

  document.getElementById('qQuestion').textContent = q.q;
  document.getElementById('qExplanation').classList.remove('visible');
  document.getElementById('qNextBtn').classList.remove('visible');

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';

  if (q.type === 'tf') {
    const div = document.createElement('div');
    div.className = 'tf-buttons';
    const tBtn = document.createElement('button');
    tBtn.className = 'tf-btn true-btn';
    tBtn.textContent = '✓ TRUE';
    const fBtn = document.createElement('button');
    fBtn.className = 'tf-btn false-btn';
    fBtn.textContent = '✗ FALSE';
    tBtn.onclick = () => answerTF(true, tBtn, fBtn, q);
    fBtn.onclick = () => answerTF(false, tBtn, fBtn, q);
    div.appendChild(tBtn);
    div.appendChild(fBtn);
    optsEl.appendChild(div);
  } else {
    const labels = ['A','B','C','D'];
    const btns = [];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerHTML = '<span class="opt-label">' + labels[i] + '</span><span>' + opt + '</span>';
      btn.onclick = () => answerMCQ(i, btns, q);
      optsEl.appendChild(btn);
      btns.push(btn);
    });
  }
}

function answerTF(chosen, tBtn, fBtn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  tBtn.disabled = true;
  fBtn.disabled = true;
  if (chosen === true) {
    tBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) fBtn.classList.add('correct');
  } else {
    fBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) tBtn.classList.add('correct');
  }
  showExplanation(isCorrect, q.exp);
}

function answerMCQ(chosen, btns, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === chosen && isCorrect) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('show-correct');
  });
  showExplanation(isCorrect, q.exp);
}

function showExplanation(correct, text) {
  const el = document.getElementById('qExplanation');
  el.innerHTML = '<strong>' + (correct ? '✓ Correct!' : '✗ Incorrect') + '</strong> — ' + text;
  el.classList.add('visible');
  const nb = document.getElementById('qNextBtn');
  nb.textContent = quizIndex + 1 < quizDeck.length ? 'Next Question →' : 'See Results';
  nb.classList.add('visible');
  document.getElementById('qScore').textContent = '✓ ' + quizCorrect;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizDeck.length) {
    showResult();
  } else {
    renderQuestion();
    document.querySelector('.main').scrollTop = 0;
  }
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.classList.add('visible');
  const pct = Math.round((quizCorrect / quizDeck.length) * 100);
  document.getElementById('rScore').textContent = pct + '%';
  const wrong = quizDeck.length - quizCorrect;
  document.getElementById('rCorrect').textContent = '✓ ' + quizCorrect + ' Correct';
  document.getElementById('rWrong').textContent = '✗ ' + wrong + ' Wrong';
  let label = '';
  if (pct >= 90) label = 'Excellent! You\'re ready for the exam 🎯';
  else if (pct >= 75) label = 'Good work — review the missed questions 📖';
  else if (pct >= 60) label = 'Keep studying — you\'re getting there 💪';
  else label = 'Review the material and try again 🔁';
  document.getElementById('rLabel').textContent = label;
}

function restartQuiz() {
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function quizBack() {
  if (quizIndex === 0 && !quizAnswered) {
    exitToMenu();
  } else {
    document.getElementById('confirmCount').textContent = quizAnswered ? quizIndex + 1 : quizIndex;
    document.getElementById('confirmModal').style.display = 'flex';
  }
}

function exitToMenu() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function closeConfirmModal() {
  document.getElementById('confirmModal').style.display = 'none';
}

function closeConfirm(e) {
  if (e.target === document.getElementById('confirmModal')) closeConfirmModal();
}

function confirmExit() {
  closeConfirmModal();
  exitToMenu();
}
</script>
</body>
</html>
